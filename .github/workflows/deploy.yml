name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup SSH key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

    - name: Deploy to EC2
      env:
        USER: ${{ secrets.EC2_USER }}
        HOST: ${{ secrets.EC2_HOST }}
      run: |
        ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 $USER@$HOST "bash -s" <<'REMOTE'
        set -e

        REPO_DIR=~/test-aws-be/test-aws-be
        mkdir -p "$REPO_DIR"
        cd "$REPO_DIR"

        if [ ! -d .git ]; then
          cd ..
          rm -rf test-aws-be
          git clone https://github.com/PURAN123/test-aws-be.git test-aws-be
          cd test-aws-be
        else
          git fetch origin main
          git reset --hard origin/main
        fi

        source env/bin/activate

        echo "📥 installing requirements"
        pip install -r requirements.txt --quiet

        echo "🗄️  running migrations"
        python manage.py migrate --noinput

        echo "📁 collecting static files"
        mkdir -p staticfiles
        python manage.py collectstatic --noinput || true

        echo "🔄 restarting service"
        sudo systemctl restart gunicorn || sudo systemctl restart mydjango || true

        echo "✅ deployment finished"
        REMOTE

    - name: Deployment status
      if: success()
      run: echo "✅ deployed to EC2"

    - name: Deployment failed
      if: failure()
      run: echo "❌ deployment failed – check logs above"
