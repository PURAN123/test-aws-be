name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup SSH key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

    - name: Deploy to EC2
      env:
        USER: ${{ secrets.EC2_USER }}
        HOST: ${{ secrets.EC2_HOST }}
      run: |
        ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 $USER@$HOST "bash -s" <<'REMOTE'
        set -e

        # ←––––– change this to the folder that contains manage.py and .git –––––→
        cd ${{ secrets.EC2_APP_DIR }}

        # if the directory wasn’t a git repo yet, clone it first
        if [ ! -d .git ]; then
          git clone https://github.com/PURAN123/test-aws-be.git
        else
          git fetch origin main
          git reset --hard origin/main
        fi

        # activate the virtualenv before running any Python commands
        source venv/bin/activate

        cd test-aws-be

        echo "📥 installing requirements"
        pip install -r requirements.txt --quiet

        echo "🗄️  running migrations"
        python manage.py migrate --noinput

        echo "📁 collecting static files"
        python manage.py collectstatic --noinput || true

        echo "🔄 restarting service"
        sudo systemctl restart gunicorn || sudo systemctl restart mydjango || true

        echo "✅ deployment finished"
        REMOTE

    - name: Deployment status
      if: success()
      run: echo "✅ deployed to EC2"
    - name: Deployment status
      if: failure()
      run: echo "❌ deployment failed – check logs above"