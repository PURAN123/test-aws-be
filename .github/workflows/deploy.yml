name: Deploy to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup SSH key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true

    - name: Deploy to EC2
      env:
        USER: ${{ secrets.EC2_USER }}
        HOST: ${{ secrets.EC2_HOST }}
      run: |
        ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 $USER@$HOST "bash -s" <<'REMOTE'
        set -e

        REPO_DIR=/var/www/test-aws-be/test-aws-be
        VENV_DIR=/var/www/test-aws-be/venv
        # ensure base directory exists and is owned by deploy user (USER is the SSH login user on EC2)
        sudo mkdir -p /var/www/test-aws-be
        # using -R so any existing files are also owned by the deploy user
        sudo chown -R $USER:$USER /var/www/test-aws-be
        mkdir -p "$REPO_DIR"
        cd "$REPO_DIR"

        if [ ! -d .git ]; then
          cd ..
          rm -rf test-aws-be
          git clone https://github.com/PURAN123/test-aws-be.git test-aws-be
          cd test-aws-be
        else
          git fetch origin main
          git reset --hard origin/main
        fi

        # Create virtualenv if it doesn't exist (first-time only)
        if [ ! -d "$VENV_DIR" ]; then
          echo "📦 creating virtual environment at $VENV_DIR"
          mkdir -p "$(dirname "$VENV_DIR")"
          python3 -m venv "$VENV_DIR"
        fi

        # Activate venv
        source "$VENV_DIR/bin/activate"

        echo "📥 upgrading pip and installing requirements"
        pip install --upgrade pip setuptools wheel --quiet
        pip install -r requirements.txt --upgrade --quiet

        echo "🗄️  running migrations"
        python manage.py migrate --noinput

        echo "📁 collecting static files"
        mkdir -p staticfiles
        python manage.py collectstatic --noinput || true

        # Install or update systemd unit (if provided in repo) and reload daemon
        if [ -f deploy/gunicorn.service ]; then
          sudo cp deploy/gunicorn.service /etc/systemd/system/gunicorn.service || true
          sudo systemctl daemon-reload || true
          sudo systemctl enable --now gunicorn || sudo systemctl start gunicorn || true
        fi

        # install nginx, configure reverse proxy
        echo "📡 installing nginx and configuring proxy"
        sudo apt-get update -y
        sudo apt-get install -y nginx || true
        if [ -f deploy/nginx.conf ]; then
          sudo cp deploy/nginx.conf /etc/nginx/sites-available/mystore || true
          sudo ln -sf /etc/nginx/sites-available/mystore /etc/nginx/sites-enabled/mystore || true
          # disable default site
          sudo rm -f /etc/nginx/sites-enabled/default || true
          sudo nginx -t || true
          sudo systemctl reload nginx || true
        fi

        # Gracefully reload gunicorn to avoid downtime; fall back to restart
        echo "🔄 reloading service gracefully"
        sudo systemctl reload gunicorn || sudo systemctl restart gunicorn || true

        echo "✅ deployment finished"
        REMOTE

    - name: Deployment status
      if: success()
      run: echo "✅ deployed to EC2"

    - name: Deployment failed
      if: failure()
      run: echo "❌ deployment failed – check logs above"
