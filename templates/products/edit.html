{% extends "base.html" %}

{% block title %}Edit Product{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-8 px-4">
      <div class="w-full max-w-md bg-white rounded-lg shadow-md p-6 sm:p-8">
        <h1 class="text-2xl sm:text-3xl font-bold text-gray-900 mb-6">Edit Product</h1>
        
        <form method="post" class="space-y-4" enctype="multipart/form-data">
          {% csrf_token %}
          
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
            <input 
              name="name" 
              value="{{ product.name }}" 
              required
              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
              placeholder="Product name"
            >
          </div>
          
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Price</label>
            <input 
              name="price" 
              value="{{ product.price }}" 
              required
              type="number"
              step="0.01"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
              placeholder="0.00"
            >
          </div>
          
          
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Image</label>
            <input 
              name="image" 
              type="file"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
            >
          </div>
          <div class="mb-4">
            {% if product.image %}
            <img src="{{ product.image.url }}" alt="{{ product.name }}" class="w-32 h-32 object-cover rounded">
            {% else %}
            <div class="w-32 h-32 bg-gray-200 flex items-center justify-center rounded">
              <span class="text-gray-500">No Image</span>
            </div>
            {% endif %}
          
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
            <textarea 
              name="description" 
              rows="4"
              class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
              placeholder="Product description"
            >{{ product.description }}</textarea>
          </div>
          
          <div class="flex gap-3 pt-2">
            <button 
              type="submit" 
              class="flex-1 py-2 px-4 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 transition"
            >
              Save
            </button>
            <a 
              href="/products/" 
              class="flex-1 text-center py-2 px-4 border border-gray-300 text-gray-700 font-medium rounded-lg hover:bg-gray-50 transition"
            >
              Cancel
            </a>
          </div>
        </form>
      </div>
    </div>
{% endblock %}
