{% extends "base.html" %}

{% block title %}Delete Product{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-8 px-4">
      <div class="w-full max-w-md bg-white rounded-lg shadow-md p-6 sm:p-8">
        <div class="mb-6">
          <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-red-100 mb-4">
            <svg class="h-6 w-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
          </div>
          <h1 class="text-2xl font-bold text-gray-900 text-center">Delete Product</h1>
        </div>
        
        <p class="text-gray-600 text-center mb-6">
          Are you sure you want to delete <span class="font-semibold text-gray-900">{{ product.name }}</span>? This action cannot be undone.
        </p>
        
        <form method="post" class="space-y-4">
          {% csrf_token %}
          
          <div class="flex gap-3">
            <button 
              type="submit" 
              class="flex-1 py-2 px-4 bg-red-600 text-white font-medium rounded-lg hover:bg-red-700 transition"
            >
              Yes, delete
            </button>
            <a 
              href="/products/" 
              class="flex-1 text-center py-2 px-4 border border-gray-300 text-gray-700 font-medium rounded-lg hover:bg-gray-50 transition"
            >
              Cancel
            </a>
          </div>
        </form>
      </div>
    </div>
{% endblock %}
