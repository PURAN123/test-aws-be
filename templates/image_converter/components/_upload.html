<!-- ─── STEP 1: UPLOAD ─── -->
<div id="step-upload">
  <p class="text-xs font-semibold uppercase tracking-widest text-indigo-500 mb-3 font-display">Step 1 — Upload Image</p>

  <div id="drop-zone" class="drop-zone rounded-xl p-10 text-center bg-gray-50 hover:bg-indigo-50 hover:border-indigo-400">
    <input type="file" id="image-input" accept="image/*" class="hidden"/>
    <div id="drop-placeholder">
      <label for="image-input" class="cursor-pointer block">
        <div class="w-14 h-14 bg-indigo-100 rounded-2xl flex items-center justify-center mx-auto mb-4">
          <svg class="w-7 h-7 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
          </svg>
        </div>
        <p class="text-gray-700 font-medium mb-1">Drag & drop your image here</p>
        <p class="text-sm text-gray-400">or <span class="text-indigo-500 underline">browse to upload</span></p>
        <p class="text-xs text-gray-400 mt-2">JPG, PNG, WEBP, GIF, BMP, TIFF · Max 5MB (compression available)</p>
      </label>
    </div>

    <div id="file-preview" class="hidden items-center gap-4">
      <img id="preview-img" class="w-16 h-16 rounded-lg object-cover border border-gray-200" src="" alt="preview"/>
      <div class="text-left">
        <p id="preview-name" class="font-medium text-gray-800 text-sm"></p>
        <p id="preview-meta" class="text-xs text-gray-400 mt-0.5"></p>
      </div>
      <button onclick="resetAll()" class="ml-auto text-xs text-red-400 hover:text-red-600 border border-red-100 hover:border-red-300 px-3 py-1 rounded-lg transition">Remove</button>
    </div>
  </div>

  <!-- Size warning -->
  <div id="size-warning" class="hidden mt-4 bg-amber-50 border border-amber-200 rounded-xl p-4 fade-in">
    <p class="text-amber-800 font-medium text-sm" id="size-warning-msg"></p>
    <div class="flex gap-3 mt-3">
      <button onclick="confirmCompress()" class="bg-amber-500 hover:bg-amber-600 text-white text-sm px-4 py-2 rounded-lg font-medium transition">Yes, Compress It</button>
      <button onclick="resetAll()" class="bg-white border border-amber-300 text-amber-700 text-sm px-4 py-2 rounded-lg font-medium transition hover:bg-amber-50">Cancel</button>
    </div>
  </div>
</div>
